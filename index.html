*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--turf)}
body{font-family:'IBM Plex Sans KR',sans-serif;color:var(--ink);max-width:680px;margin:0 auto;padding:0 14px 90px;-webkit-font-smoothing:antialiased}

header{position:relative;background:linear-gradient(180deg,rgba(8,43,26,.12) 0%,rgba(8,43,26,.12) 52%,rgba(8,43,26,.88) 100%),var(--hero-bg) center 22%/cover no-repeat,linear-gradient(180deg,var(--board),var(--board-deep));color:#F5F1E6;border-radius:0 0 var(--radius) var(--radius);padding:220px 20px 20px;margin:0 -14px 16px;text-align:center;border-bottom:3px solid var(--gold)}
header .eyebrow{font-size:11px;letter-spacing:.35em;color:var(--gold);font-weight:700;text-shadow:0 1px 6px rgba(0,0,0,.55)}
header h1{font-size:28px;font-weight:700;letter-spacing:.06em;margin-top:6px;text-shadow:0 2px 10px rgba(0,0,0,.6)}
header .sub{font-size:12px;color:#BCCDBF;margin-top:6px}

nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:var(--card);border-top:1px solid var(--line);display:flex;max-width:680px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:12px 4px 10px;border:0;background:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;color:var(--ink-soft);border-top:3px solid transparent}
nav button.on{color:var(--board);font-weight:700;border-top-color:var(--gold)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
h2{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
h2 .tag{font-size:11px;font-weight:500;color:var(--ink-soft)}
.muted{color:var(--ink-soft);font-size:13px;line-height:1.6}
.empty{padding:26px 10px;text-align:center;color:var(--ink-soft);font-size:13px;line-height:1.7}

/* 방식 선택 */
.method-bar{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px}
.method-bar label{margin:0 0 6px;font-size:11px;letter-spacing:.15em}
select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;color:var(--board);background:#FBFCFA;appearance:none;cursor:pointer}
select:focus{outline:2px solid var(--board);outline-offset:-1px}
.method-desc{font-size:12px;color:var(--ink-soft);line-height:1.65;margin-top:9px}
details.rules{margin-top:8px}
details.rules summary{font-size:12px;font-weight:700;color:var(--board);cursor:pointer}
details.rules .method-desc{margin-top:6px}

.lb{background:var(--board);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.lb-head{padding:14px 16px 10px;color:#F5F1E6;border-bottom:1px solid rgba(255,255,255,.15)}
.lb-head .rt{font-size:11px;letter-spacing:.25em;color:var(--gold);font-weight:700}
.lb-head .rn{font-size:16px;font-weight:700;margin-top:3px}
.lb-head .rd{font-size:12px;color:#BCCDBF;margin-top:2px}
.row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.row:last-child{border-bottom:0}
.rank{font-family:var(--num);font-size:17px;width:26px;text-align:center;color:#D8E2D6}
.rank.first{color:var(--gold)}
.pname{flex:1;color:#F5F1E6;font-weight:500;font-size:15px}
.pname small{display:block;font-size:11px;color:#9FB4A3;font-weight:400;margin-top:1px}
.gross{font-family:var(--num);font-size:15px;color:#BCCDBF;width:44px;text-align:right}
.diff{font-family:var(--num);font-size:16px;font-weight:600;min-width:62px;text-align:center;padding:4px 8px;border-radius:8px;background:#fff}
.diff.u{color:var(--under)} .diff.o{color:var(--over)} .diff.e{color:var(--even)}
.diff.pt{color:var(--board)} .diff.gd{color:#8A6D1F}
.diff.na{font-family:inherit;font-size:11px;color:var(--ink-soft);font-weight:500}

table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:700;color:var(--ink-soft);text-align:center;padding:6px 4px;border-bottom:2px solid var(--line)}
th:first-child,td:first-child{text-align:left}
td{padding:9px 4px;text-align:center;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:0}
td .n{font-family:var(--num);font-size:14px}
.u-txt{color:var(--under);font-weight:600}.o-txt{color:var(--over);font-weight:600}

label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin:12px 0 5px}
input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px;background:#FBFCFA;color:var(--ink)}
input:focus{outline:2px solid var(--board);outline-offset:-1px}
input[readonly]{background:#EEF2ED;color:var(--ink-soft)}

.p-block{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px}
.p-top{display:flex;align-items:center;gap:10px}
.p-top .nm{flex:1;font-size:14px;font-weight:700}
.p-top .base{font-size:11px;color:var(--ink-soft)}
.p-top input{width:78px;text-align:center;font-family:var(--num);font-size:17px;padding:8px}
.hole-toggle{background:none;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:11px;color:var(--board);font-weight:700;padding:7px 9px;cursor:pointer;white-space:nowrap}
.hole-toggle.on{background:var(--board);color:#fff;border-color:var(--board)}
.holes{display:none;margin-top:10px}
.holes.open{display:block}
.nine{display:grid;grid-template-columns:34px repeat(9,1fr) 42px;gap:3px;align-items:center;margin-bottom:5px}
.nine .lab{font-family:var(--num);font-size:11px;color:var(--ink-soft);text-align:center}
.nine input{padding:7px 0;text-align:center;font-family:var(--num);font-size:14px;border-radius:7px;-moz-appearance:textfield}
.nine input::-webkit-outer-spin-button,.nine input::-webkit-inner-spin-button{-webkit-appearance:none}
.nine input.bd{color:var(--under);border-color:#F0C4BD} .nine input.bg{color:var(--over);border-color:#BFD0EA}
.nine .sum{font-family:var(--num);font-size:13px;font-weight:600;text-align:center;color:var(--board)}
.mode-chips{display:flex;gap:6px;margin:6px 0 4px}
.mode-chips button{flex:1;padding:9px;border:1px solid var(--line);background:#FBFCFA;border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;color:var(--ink-soft);cursor:pointer}
.mode-chips button.on{background:var(--board);color:#fff;border-color:var(--board)}

.photo-box{border:2px dashed #B9C8BB;border-radius:12px;padding:16px;text-align:center;cursor:pointer;background:#F7FAF6}
.photo-box:active{background:#EEF4ED}
.photo-box .ic{font-size:26px}
.photo-box .t1{font-size:14px;font-weight:700;margin-top:6px}
.photo-box .t2{font-size:12px;color:var(--ink-soft);margin-top:3px}
.photo-status{margin-top:10px;font-size:13px;line-height:1.6;display:none}
.photo-status.show{display:block}
.photo-status.ok{color:var(--board)} .photo-status.err{color:var(--under)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--board);border-radius:50%;animation:sp 1s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spin{animation:none}}

.btn{display:block;width:100%;margin-top:16px;padding:13px;border:0;border-radius:10px;background:var(--board);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.btn:active{background:var(--board-deep)}
.btn:disabled{background:#B9C4BB;cursor:not-allowed}
.btn.ghost{background:none;color:var(--ink-soft);border:1px solid var(--line);font-weight:500;font-size:13px;padding:11px}
.inline{display:flex;gap:8px;margin-top:10px}
.inline input{flex:1}
.inline .btn{width:auto;margin:0;padding:11px 18px;font-size:14px}

.hist{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.hist-head{display:flex;justify-content:space-between;align-items:center;background:#F4F7F2;padding:10px 12px;font-size:13px}
.hist-head b{font-weight:700}
.hist-head span{color:var(--ink-soft);font-size:12px}
.hist-body{padding:4px 12px 8px}
.hist-line{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px dashed var(--line)}
.hist-line:last-child{border-bottom:0}
.hist-line .sc{font-family:var(--num)}
.hist-line small{color:var(--ink-soft);font-size:11px}
.hist .del{background:none;border:0;color:var(--ink-soft);font-size:11px;cursor:pointer;padding:4px 6px;font-family:inherit;text-decoration:underline}

.member-li{display:flex;justify-content:space-between;align-items:center;padding:10px 2px;border-bottom:1px solid var(--line);font-size:14px}
.member-li:last-child{border-bottom:0}
.member-li small{color:var(--ink-soft)}

.notice{background:#F6F2E6;border:1px solid #E5D9B8;border-radius:10px;padding:10px 12px;font-size:12px;color:#6E5F35;line-height:1.6;margin-bottom:14px}
.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:99px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:30;white-space:nowrap}
.toast.show{opacity:.94}
.hide{display:none}

/* 캐릭터 순위 */
.char-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 14px 8px;margin-bottom:14px}
.char-card h2{margin-bottom:12px}
.char{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:12px;margin-bottom:8px;color:#fff}
.char:last-child{margin-bottom:2px}
.char .ava{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.char .info{flex:1;min-width:0}
.char .info .who{font-weight:700;font-size:15px}
.char .info .who .rk{font-family:var(--num);opacity:.85;margin-right:5px}
.char .info .role{font-size:12px;opacity:.92;margin-top:1px}
.char .info .role b{font-weight:700}
.char .sc{text-align:right;font-family:var(--num);font-size:15px;flex-shrink:0}
.char .sc .d{font-size:13px;opacity:.95}

/* 홀별 상세 (기록 탭) */
.name-btn{background:none;border:0;padding:0;font:inherit;color:var(--board);font-weight:600;cursor:pointer;text-align:left;display:inline-flex;align-items:center;gap:4px}
.name-btn .caret{font-size:10px;transition:transform .2s}
.name-btn.open .caret{transform:rotate(90deg)}
.hole-detail{margin:6px 0 10px;padding:8px;background:#F7FAF6;border:1px solid var(--line);border-radius:10px}
.hd-nine{display:grid;grid-template-columns:30px repeat(9,1fr) 34px;gap:2px;align-items:center;margin-bottom:4px}
.hd-nine div{text-align:center;font-family:var(--num);font-size:11px;padding:3px 0;border-radius:4px}
.hd-nine .hl{color:var(--ink-soft);font-size:10px}
.hd-nine .sm{font-weight:700;color:var(--board)}

<script>
const KEY='golf-club-v1';
const BASELINE_N=3;
const DEFAULT_PARS=[4,5,4,3,4,4,5,3,4,4,5,4,3,4,4,5,3,4]; // 파72 표준 구성
let db={members:[],rounds:[],settings:{method:'avg'}};
let tab='board';
let holeMode='diff'; // 홀별 입력 방식: 'diff' = 파 대비 ±(기본), 'strokes' = 실제 타수
let editingId=null;   // 수정 중인 라운드 ID (null이면 새 라운드 입력)

/* ── 5가지 순위 방식 정의 ───────────────── */
const METHODS={
  avg:{ name:'① 평균 대비 (기본 추천)', short:'평균 대비',
    metric:'누적 언더/오버',
    desc:'본인 최근 3회 평균이 기준타수. 기준보다 잘 치면 언더(-), 못 치면 오버(+)이며 언더가 가장 큰 사람이 우승합니다. 실력 차이가 커도 공평해서 정기 모임에 가장 적합합니다. 동점이면 실제 타수가 많은 쪽이 우승, 첫 기록자는 기준 수립을 위해 그 라운드 순위에서 제외됩니다.'},
  stroke:{ name:'② 스트로크 (총타수)', short:'스트로크',
    metric:'평균 순위',
    desc:'핸디 없이 실제 총타수가 가장 적은 사람이 우승하는 정통 방식입니다. 실력 차이가 그대로 드러나므로 “오늘은 진검승부” 하고 싶은 날에 쓰세요. 동점이면 공동 순위 대신 백카운트 개념으로 IN(10~18번홀) 합계가 적은 쪽이 우승합니다.'},
  stableford:{ name:'③ 스테이블포드 (포인트제)', short:'스테이블포드',
    metric:'평균 포인트',
    desc:'홀마다 파 대비 성적을 점수로 바꿔 합산합니다: 이글 4점 · 버디 3점 · 파 2점 · 보기 1점 · 더블보기 이상 0점. 한 홀 크게 망해도 0점으로 끝나 멘탈이 무너지지 않고, 공격적인 플레이가 유리해 라운드가 즐거워집니다. 점수가 높은 사람이 우승하며, 홀별 기록과 코스 파 입력이 필요합니다.'},
  newperio:{ name:'④ 신페리오 (히든홀 핸디)', short:'신페리오',
    metric:'평균 네트',
    desc:'한국 아마추어 대회 표준 방식. 라운드마다 앞 9홀 중 6개·뒤 9홀 중 6개의 히든홀을 무작위로 뽑아(모두에게 동일하게 자동 추첨) 핸디캡 = (히든 12홀 합계 × 1.5 − 코스 파) × 0.8 로 계산하고, 네트 = 총타수 − 핸디캡 이 가장 적은 사람이 우승합니다. 그날 컨디션이 핸디에 반영돼 이변이 자주 나옵니다. 홀별 기록이 필요합니다.'},
  skins:{ name:'⑤ 스킨스 (홀별 승부)', short:'스킨스',
    metric:'총 스킨',
    desc:'홀마다 단독 최저타를 친 사람이 그 홀의 스킨(1점)을 가져갑니다. 동타면 스킨이 다음 홀로 이월되어 판이 커집니다. 18홀 내내 홀 하나하나가 승부라 긴장감이 최고이며, 스킨을 가장 많이 모은 사람이 우승합니다(동점 시 총타수 적은 쪽). 참가자 전원의 홀별 기록이 필요합니다.'}
};
function curMethod(){ return METHODS[db.settings?.method] ? db.settings.method : 'avg'; }

/* ── 순위별 캐릭터 (현재 순위를 재미있게) ───────────────── */
const RANK_CHARS=[
  {emoji:'🦅',title:'이글 킹',line:'오늘 필드의 지배자',bg:'linear-gradient(135deg,#B8912F,#EAD08A)',fg:'#3A2E0A'},
  {emoji:'🐯',title:'버디 헌터',line:'왕좌를 노리는 추격자',bg:'linear-gradient(135deg,#C9762E,#F0B36E)',fg:'#3A2408'},
  {emoji:'🐺',title:'파 세이버',line:'묵묵히 지키는 중원의 강자',bg:'linear-gradient(135deg,#3F7D5C,#8FC0A2)',fg:'#0C3020'},
  {emoji:'🦊',title:'보기 파이터',line:'반전을 노리는 승부사',bg:'linear-gradient(135deg,#4E6BB0,#A2B6E2)',fg:'#0F1E42'},
  {emoji:'🐢',title:'해저드 마스터',line:'즐기는 자가 진정한 승자',bg:'linear-gradient(135deg,#7C8290,#BEC3CC)',fg:'#22262E'},
];

/* ── 저장소 (브라우저 로컬 저장 + 파일 내장 데이터) ─────────────────
   · 입력·수정은 이 기기 브라우저(localStorage)에 저장됩니다.
   · "공유용 내보내기"로 만든 파일에는 데이터가 내장(EMBED)되어,
     친구들이 링크로 열면 그 내장 데이터를 읽어 결과만 보여줍니다.        */
const PHOTO_PREFIX='golfphoto_';
const photoKey=id=>`${PHOTO_PREFIX}${id}`;
// 이 파일에 내장된 데이터(공유본일 때만 존재). 내보내기 시 아래 값이 채워집니다.
window.__EMBED__ = window.__EMBED__ || null;
let isViewerOnly=false; // 이 기기에 저장된 데이터가 없고 내장 데이터로만 볼 때 true

async function load(){
  let loaded=false;
  // 1) 이 기기(localStorage)에 저장된 내 데이터 우선
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){ db=JSON.parse(raw); if(!db.settings) db.settings={method:'avg'}; loaded=true; }
  }catch(e){}
  // 2) 없으면 파일에 내장된 공유 데이터 사용(친구들이 링크로 열었을 때)
  if(!loaded && window.__EMBED__ && window.__EMBED__.members){
    db=window.__EMBED__;
    if(!db.settings) db.settings={method:'avg'};
    isViewerOnly=true;
    // 내장 사진을 메모리 캐시에 올림
    if(window.__EMBED__.photos){ for(const id in window.__EMBED__.photos){ _photoCache[id]=window.__EMBED__.photos[id]; } }
  }
  const n=document.getElementById('notice');
  if(n){
    if(isViewerOnly){
      n.innerHTML='👀 <b>결과 보기</b> 화면입니다. 기록은 운영자가 관리하며, 여기서는 순위·기록·사진첩을 볼 수 있습니다.';
    } else {
      n.innerHTML='✍️ <b>내 기기 저장</b> 모드입니다. 입력·수정은 이 기기에 저장됩니다. 친구들과 공유하려면 <b>멤버 탭 → 공유용 내보내기</b>로 파일을 만들어 올리세요.';
    }
    n.classList.remove('hide');
  }
}
async function save(){
  if(isViewerOnly) return; // 공유본(보기 전용)에서는 저장하지 않음
  try{ localStorage.setItem(KEY,JSON.stringify(db)); }
  catch(e){ toast('저장 공간이 부족할 수 있어요. 사진이 너무 많으면 정리해 주세요.'); }
}
/* 추억 사진: 라운드별 별도 저장(용량 분리) — 로컬 저장 + 메모리 캐시 */
const _photoCache={};
async function savePhoto(id,dataURL){
  _photoCache[id]=dataURL;
  if(isViewerOnly) return true;
  try{ localStorage.setItem(photoKey(id),dataURL); return true; }catch(e){ toast('사진 저장 공간이 부족해요.'); return false; }
}
async function getPhoto(id){
  if(_photoCache[id]!=null) return _photoCache[id];
  try{ const v=localStorage.getItem(photoKey(id)); if(v){ _photoCache[id]=v; return v; } }catch(e){}
  return null;
}
async function delPhoto(id){
  delete _photoCache[id];
  if(isViewerOnly) return;
  try{ localStorage.removeItem(photoKey(id)); }catch(e){}
}
/* 모든 사진을 한 번에 모아오기(공유용 내보내기에 사용) */
async function collectAllPhotos(){
  const photos={};
  for(const r of db.rounds){ if(r.hasPhoto){ const p=await getPhoto(r.id); if(p) photos[r.id]=p; } }
  return photos;
}
/* ── 백업 · 복원 ───────────────── */
async function exportBackup(withPhotos){
  const data={app:'oseong-golf',version:1,exportedAt:new Date().toISOString(),
    members:db.members,rounds:db.rounds,settings:db.settings||{method:'avg'}};
  if(withPhotos){
    const photos={};
    for(const r of db.rounds){ if(r.hasPhoto){ const p=await getPhoto(r.id); if(p) photos[r.id]=p; } }
    data.photos=photos;
  }
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`버디골프회_백업_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast(withPhotos?'사진 포함 백업을 내려받았어요.':'기록 백업을 내려받았어요.');
}
// 공유용 index.html 만들기: 현재 데이터를 파일에 내장해 내려받기
async function exportShareableSite(){
  toast('공유용 파일을 만드는 중이에요…');
  try{
    const photos=await collectAllPhotos();
    const embed={app:'birdie-golf',version:1,exportedAt:new Date().toISOString(),
      members:db.members,rounds:db.rounds,settings:db.settings||{method:'avg'},photos};
    // 현재 페이지 전체 HTML을 복제한 뒤, 데이터 내장 스크립트를 심는다
    let html=document.documentElement.outerHTML;
    // 기존에 심긴 내장 스크립트가 있으면 제거
    html=html.replace(/<script id="birdie-embed">[\s\S]*?<\/script>/,'');
    const embedScript=`<script id="birdie-embed">window.__EMBED__=${JSON.stringify(embed).replace(/</g,'\\u003c')};<\/script>`;
    // <head> 시작 직후에 삽입해 앱 실행 전에 데이터가 준비되게 함
    if(/<head[^>]*>/i.test(html)){ html=html.replace(/(<head[^>]*>)/i,`$1${embedScript}`); }
    else { html=embedScript+html; }
    const full='<!doctype html>\n'+html;
    const blob=new Blob([full],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='index.html';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    const mb=(full.length/1048576).toFixed(1);
    toast(`공유용 index.html을 내려받았어요. (약 ${mb}MB) GitHub에 덮어씌워 올리세요.`);
  }catch(e){ console.error(e); toast('공유용 파일 만들기에 실패했어요.'); }
}
async function importBackup(file){
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!data||!Array.isArray(data.members)||!Array.isArray(data.rounds)){ toast('올바른 백업 파일이 아니에요.'); return; }
    if(!confirm(`백업으로 복원하면 현재 앱의 기록(멤버 ${db.members.length}명·라운드 ${db.rounds.length}회)이 백업 내용(멤버 ${data.members.length}명·라운드 ${data.rounds.length}회)으로 모두 교체됩니다. 계속할까요?`)) return;
    db.members=data.members;
    db.rounds=data.rounds;
    db.settings=data.settings||{method:'avg'};
    if(data.photos){
      for(const id in data.photos){ await savePhoto(id,data.photos[id]); }
    }
    await save(); tab='board'; render(); toast('백업에서 복원했어요!');
  }catch(e){ console.error(e); toast('복원에 실패했어요. 파일을 확인해 주세요.'); }
}
let memPhotoData=null;    // 새로 선택/교체한 dataURL
let memPhotoRemoved=false;// 편집 중 기존 사진 삭제 표시

/* ── 공통 계산 ───────────────── */
function sortedRounds(){ return [...db.rounds].sort((a,b)=> a.date===b.date ? a.id-b.id : (a.date<b.date?-1:1)); }
function getPars(r){ return (Array.isArray(r.pars)&&r.pars.length===18&&r.pars.every(v=>v>=3&&v<=6)) ? r.pars : DEFAULT_PARS; }
function fullHoles(r,mid){
  const h=(r.holes||{})[mid];
  return (Array.isArray(h)&&h.filter(v=>typeof v==='number').length===18) ? h : null;
}
function baselineBefore(memberId, roundId){
  const rs=sortedRounds();
  const idx = roundId==null ? rs.length : rs.findIndex(r=>r.id===roundId);
  const prev=[];
  for(let i=(idx<0?rs.length:idx)-1;i>=0&&prev.length<BASELINE_N;i--){
    const s=rs[i].scores[memberId];
    if(typeof s==='number') prev.push(s);
  }
  // 등록 시 입력한 평균타수를 초기 기준으로 사용(실제 라운드가 3회 미만일 때 채움)
  const mem=db.members.find(x=>x.id===memberId);
  const seed=(mem&&typeof mem.baseAvg==='number')?mem.baseAvg:null;
  if(prev.length<BASELINE_N && seed!=null){
    while(prev.length<BASELINE_N) prev.push(seed);
  }
  if(!prev.length) return null;
  return prev.reduce((a,b)=>a+b,0)/prev.length;
}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function hiddenHoles(roundId){ // 앞9 중 6, 뒤9 중 6 — 라운드 ID 기반이라 모두에게 동일
  const rng=mulberry32(roundId>>>0);
  const pick=(arr,n)=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,n);};
  return [...pick([0,1,2,3,4,5,6,7,8],6),...pick([9,10,11,12,13,14,15,16,17],6)].sort((a,b)=>a-b);
}
function stablefordPts(holes,pars){
  let p=0;
  for(let i=0;i<18;i++){
    const d=holes[i]-pars[i];
    p += d<=-2?4 : d===-1?3 : d===0?2 : d===1?1 : 0;
    if(d<=-3) p+=1; // 알바트로스 5점
  }
  return p;
}
function skinsFor(round,players){ // players: [{mid,holes}]
  const res={}; players.forEach(p=>res[p.mid]=0);
  let pot=1;
  for(let h=0;h<18;h++){
    const scores=players.map(p=>({mid:p.mid,s:p.holes[h]}));
    const min=Math.min(...scores.map(x=>x.s));
    const winners=scores.filter(x=>x.s===min);
    if(winners.length===1){ res[winners[0].mid]+=pot; pot=1; }
    else pot++;
  }
  return res;
}

/* ── 방식별 라운드 결과 ───────────────── */
function roundResult(round, method){
  method=method||round.method||curMethod();
  const pars=getPars(round);
  const base=db.members.map(m=>{
    const gross=round.scores[m.id];
    if(typeof gross!=='number') return null;
    return {m, gross, holes:fullHoles(round,m.id)};
  }).filter(Boolean);

  let rows;
  if(method==='avg'){
    rows=base.map(r=>{
      const b=baselineBefore(r.m.id, round.id);
      const diff=b==null?null:+(r.gross-b).toFixed(1);
      return {...r, rankable:b!=null, val:diff,
        sub: b==null?'첫 기록 · 다음 라운드부터 순위 반영':'기준 '+b.toFixed(1)+'타',
        badge:diffBadge(diff), text:diffTxt(diff)};
    });
    rows.sort((a,b)=>rk(a,b)||a.val-b.val||b.gross-a.gross);
  }
  else if(method==='stroke'){
    rows=base.map(r=>{
      const inn=r.holes?r.holes.slice(9).reduce((a,b)=>a+b,0):null;
      return {...r, rankable:true, val:r.gross, sub:'',
        badge:`<span class="diff e">${r.gross}타</span>`, text:`${r.gross}타`, inn};
    });
    rows.sort((a,b)=>a.val-b.val||((a.inn??99)-(b.inn??99)));
  }
  else if(method==='stableford'){
    rows=base.map(r=>{
      if(!r.holes) return {...r, rankable:false, val:null, sub:'홀별 기록 필요',
        badge:'<span class="diff na">홀별 기록 필요</span>', text:'–'};
      const p=stablefordPts(r.holes,pars);
      return {...r, rankable:true, val:p, sub:'',
        badge:`<span class="diff gd">${p}점</span>`, text:`<b>${p}점</b>`};
    });
    rows.sort((a,b)=>rk(a,b)||b.val-a.val||a.gross-b.gross);
  }
  else if(method==='newperio'){
    const hid=hiddenHoles(round.id);
    const parTotal=pars.reduce((a,b)=>a+b,0);
    rows=base.map(r=>{
      if(!r.holes) return {...r, rankable:false, val:null, sub:'홀별 기록 필요',
        badge:'<span class="diff na">홀별 기록 필요</span>', text:'–'};
      const hidSum=hid.reduce((a,i)=>a+r.holes[i],0);
      const hcp=+(((hidSum*1.5)-parTotal)*0.8).toFixed(1);
      const net=+(r.gross-hcp).toFixed(1);
      return {...r, rankable:true, val:net, sub:'핸디 '+hcp,
        badge:`<span class="diff pt">NET ${net}</span>`, text:`NET ${net} <small>(핸디 ${hcp})</small>`};
    });
    rows.sort((a,b)=>rk(a,b)||a.val-b.val||a.gross-b.gross);
    rows.hidden=hid;
  }
  else { // skins
    const players=base.filter(r=>r.holes).map(r=>({mid:r.m.id,holes:r.holes}));
    const sk=players.length>=2?skinsFor(round,players):{};
    rows=base.map(r=>{
      if(!r.holes||players.length<2) return {...r, rankable:false, val:null,
        sub:players.length<2?'전원 홀별 기록 필요':'홀별 기록 필요',
        badge:'<span class="diff na">홀별 기록 필요</span>', text:'–'};
      const n=sk[r.m.id]||0;
      return {...r, rankable:true, val:n, sub:'',
        badge:`<span class="diff gd">${n} 스킨</span>`, text:`<b>${n}스킨</b>`};
    });
    rows.sort((a,b)=>rk(a,b)||b.val-a.val||a.gross-b.gross);
  }
  return rows;
}
function rk(a,b){ if(a.rankable&&!b.rankable)return -1; if(!a.rankable&&b.rankable)return 1; if(!a.rankable&&!b.rankable)return a.gross-b.gross; return 0; }

/* ── 시즌 통계 ───────────────── */
function seasonStats(method){
  method=method||curMethod();
  const rs=sortedRounds();
  return db.members.map(m=>{
    let played=0,sum=0,best=null,wins=0,acc=0,accN=0,rankSum=0,rankN=0;
    rs.forEach(r=>{
      const s=r.scores[m.id];
      if(typeof s!=='number') return;
      played++;sum+=s;if(best==null||s<best)best=s;
      // 우승 횟수: 그 라운드에 실제로 적용된 방식(리더보드·기록과 동일) 기준
      const winRes=roundResult(r);
      if(winRes.length&&winRes[0].rankable&&winRes[0].m.id===m.id) wins++;
      // 지표·평균순위: 시즌 종합 기준 방식으로 통일해 비교
      const res=roundResult(r,method);
      const idx=res.findIndex(x=>x.m.id===m.id);
      const row=res[idx];
      if(row&&row.rankable){
        rankSum+=idx+1;rankN++;
        if(row.val!=null){acc+=row.val;accN++;}
      }
    });
    let metric='–';
    if(accN){
      if(method==='avg'){const v=+acc.toFixed(1);metric=diffTxt(v);}
      else if(method==='stableford') metric=`<span class="n">${(acc/accN).toFixed(1)}</span>`;
      else if(method==='newperio') metric=`<span class="n">${(acc/accN).toFixed(1)}</span>`;
      else if(method==='skins') metric=`<span class="n">${acc}</span>`;
      else metric=rankN?`<span class="n">${(rankSum/rankN).toFixed(1)}위</span>`:'–';
    } else if(method==='stroke'&&rankN){ metric=`<span class="n">${(rankSum/rankN).toFixed(1)}위</span>`; }
    return {m,played,avg:played?sum/played:null,best,wins,metric};
  });
}

/* ── 도우미 ───────────────── */
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function diffBadge(d){
  if(d==null) return '<span class="diff na">기준 수립중</span>';
  if(d<0)  return `<span class="diff u">${d}</span>`;
  if(d>0)  return `<span class="diff o">+${d}</span>`;
  return '<span class="diff e">E</span>';
}
function diffTxt(d){ if(d==null)return '–'; if(d<0)return `<span class="u-txt">${d}</span>`; if(d>0)return `<span class="o-txt">+${d}</span>`; return 'E'; }
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

/* 수정 모드: 기존 기록을 입력 칸에 채우기 */
function populateEditScores(){
  const r=db.rounds.find(x=>x.id===editingId);
  if(!r) return;
  const pars=getPars(r);
  db.members.forEach(m=>{
    const gross=r.scores[m.id];
    const holes=(r.holes||{})[m.id];
    const full=Array.isArray(holes)&&holes.filter(v=>typeof v==='number').length===18;
    if(full){
      const box=document.getElementById('holes-'+m.id);
      const tgl=document.querySelector(`[data-toggle="${m.id}"]`);
      if(box){box.classList.add('open');if(tgl)tgl.classList.add('on');}
      holes.forEach((v,h)=>{
        const cell=document.querySelector(`[data-hole="${m.id}-${h}"]`);
        if(!cell) return;
        cell.value=String(holeMode==='diff'?v-pars[h]:v);
        tintHoleCell(cell);
      });
      refreshMemberSum(m.id);
    } else if(typeof gross==='number'){
      const t=document.querySelector(`[data-score="${m.id}"]`);
      if(t) t.value=gross;
    }
  });
}

/* ── 합계 자동 갱신 ───────────────── */
function curPars(){
  const cells=[...document.querySelectorAll('[data-par]')];
  if(cells.length!==18) return DEFAULT_PARS;
  return cells.map((c,h)=>{const v=parseInt(c.value,10);return (isNaN(v)||v<3||v>6)?DEFAULT_PARS[h]:v;});
}
function cellStrokes(c,pars){ // 셀 값 → 실제 타수
  if(c.value==='') return null;
  const v=parseInt(c.value,10); if(isNaN(v)) return null;
  const h=parseInt(c.dataset.hole.split('-')[1],10);
  return holeMode==='diff' ? pars[h]+v : v;
}
function refreshMemberSum(mid){
  const pars=curPars();
  const cells=[...document.querySelectorAll(`[data-hole^="${mid}-"]`)];
  const vals=cells.map(c=>cellStrokes(c,pars));
  const sumOf=(a,b)=>vals.slice(a,b).reduce((s,v)=>s+(v||0),0);
  const cnt=vals.filter(v=>v!=null&&!isNaN(v)).length;
  const outEl=document.getElementById('out-'+mid), inEl=document.getElementById('in-'+mid);
  if(outEl) outEl.textContent = vals.slice(0,9).some(v=>v!=null)?sumOf(0,9):'–';
  if(inEl)  inEl.textContent  = vals.slice(9,18).some(v=>v!=null)?sumOf(9,18):'–';
  const total=document.querySelector(`[data-score="${mid}"]`);
  if(!total) return;
  if(cnt>0){ total.value=sumOf(0,18); total.readOnly=true; }
  else { total.readOnly=false; }
}
function refreshParSum(){
  const vals=[...document.querySelectorAll('[data-par]')].map(c=>parseInt(c.value,10)||0);
  const o=document.getElementById('out-par'),i=document.getElementById('in-par');
  if(o) o.textContent=vals.slice(0,9).reduce((a,b)=>a+b,0);
  if(i) i.textContent=vals.slice(9,18).reduce((a,b)=>a+b,0);
}

/* 추억 사진: 용량 절약을 위해 최대 1200px·품질 0.72 dataURL로 변환 */
async function downscalePhoto(file){
  const url=URL.createObjectURL(file);
  try{
    const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url;});
    const MAX=1200;
    const sc=Math.min(1,MAX/Math.max(img.width,img.height));
    const cv=document.createElement('canvas');
    cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    return cv.toDataURL('image/jpeg',0.72);
  } finally { URL.revokeObjectURL(url); }
}

  for(let h=0;h<9;h++) out+=cell(h);
  for(let h=9;h<18;h++) inn+=cell(h);
  const oSum=holes.slice(0,9).reduce((a,b)=>a+b,0), iSum=holes.slice(9).reduce((a,b)=>a+b,0);
  const pOut=pars.slice(0,9).reduce((a,b)=>a+b,0), pIn=pars.slice(9).reduce((a,b)=>a+b,0);
  return `<div class="hole-detail">
    <div class="hd-nine"><div class="hl">홀</div>${labs(1)}<div class="hl">OUT</div></div>
    <div class="hd-nine"><div class="hl">파</div>${pars.slice(0,9).map(p=>`<div class="hl">${p}</div>`).join('')}<div class="hl">${pOut}</div></div>
    <div class="hd-nine"><div class="hl">타</div>${out}<div class="sm">${oSum}</div></div>
    <div class="hd-nine"><div class="hl">홀</div>${labs(10)}<div class="hl">IN</div></div>
    <div class="hd-nine"><div class="hl">파</div>${pars.slice(9).map(p=>`<div class="hl">${p}</div>`).join('')}<div class="hl">${pIn}</div></div>
    <div class="hd-nine"><div class="hl">타</div>${inn}<div class="sm">${iSum}</div></div>
  </div>`;
}
function viewHist(){
  const rs=sortedRounds();
  if(!rs.length) return `<div class="card empty">저장된 라운드가 없습니다.</div>`;
  let html=`<div class="card"><h2>라운드 기록 <span class="tag">최신순 · 라운드별 방식</span></h2>`;
  [...rs].reverse().forEach((r,ri)=>{
    const no=rs.length-ri;
    const rMethod=r.method||curMethod();
    const pars=getPars(r);
    const res=roundResult(r); // 라운드 자체 방식
    let lines=res.map((x,i)=>{
      let sub='';
      if(x.holes){
        const out=x.holes.slice(0,9).reduce((a,b)=>a+b,0), inn=x.holes.slice(9).reduce((a,b)=>a+b,0);
        sub=`<small> · OUT ${out} / IN ${inn}</small>`;
      }
      const nameCell = x.holes
        ? `<button class="name-btn" data-hd="${r.id}-${x.m.id}"><span class="caret">▶</span>${x.rankable?(i+1)+'위 · ':''}${esc(x.m.name)}${sub}</button>`
        : `<span>${x.rankable?(i+1)+'위 · ':''}${esc(x.m.name)}${sub}</span>`;
      const detail = x.holes ? `<div class="hd-wrap hide" id="hd-${r.id}-${x.m.id}">${holeDetailHTML(x.holes,pars)}</div>` : '';
      return `<div class="hist-line">
        ${nameCell}
        <span class="sc">${x.gross}타 &nbsp;${x.text}</span>
      </div>${detail}`;
    }).join('');
    const photo = r.hasPhoto ? `<div class="hist-photo-wrap"><img class="hist-photo" data-photo-round="${r.id}" alt="추억 사진"><div class="hist-photo-cap">📸 ${esc(r.date)}</div></div>` : '';
    html+=`<div class="hist">
      <div class="hist-head"><b>제${no}회 · ${esc(r.course||'라운드')}</b>
        <span>${esc(r.date)} <button class="del" data-edit="${r.id}">수정</button><button class="del" data-del="${r.id}">삭제</button></span></div>
      <div class="hist-body">${photo}<div class="hist-line" style="border-bottom:1px solid var(--line)"><span class="muted" style="font-size:11px">순위 방식: ${METHODS[rMethod].short} · 홀별 기록은 이름을 눌러 확인</span><span></span></div>${lines}</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

/* ── 사진첩 ───────────────── */
function viewAlbum(){
  const rs=sortedRounds();
  const withPhoto=[...rs].reverse().filter(r=>r.hasPhoto);
  let grid;
  if(!withPhoto.length){
    grid=`<p class="empty">아직 등록된 사진이 없어요.<br>라운드를 입력할 때 <b>추억 사진</b>을 올리면 여기에 모입니다.</p>`;
  } else {
    grid=withPhoto.map(r=>{
      const no=rs.findIndex(x=>x.id===r.id)+1;
      return `<div class="album-item">
        <img data-album-round="${r.id}" alt="제${no}회 추억 사진" loading="lazy">
        <div class="album-cap"><b>제${no}회</b> ${esc(r.course||'라운드')}<br><small>${esc(r.date)}</small></div>
      </div>`;
    }).join('');
  }
  return `<div class="card"><h2>📸 사진첩 <span class="tag">${withPhoto.length}장</span></h2>
    <p class="muted" style="margin-bottom:12px">라운드마다 올린 추억 사진을 모아 봅니다. 사진을 누르면 크게 볼 수 있어요.</p>
    <div class="album-grid" id="album-grid">${grid}</div></div>`;
}

function viewMember(){
  let list=db.members.map(m=>{
    const played=sortedRounds().filter(r=>typeof r.scores[m.id]==='number').length;
    const avgTxt = typeof m.baseAvg==='number' ? `평균 ${m.baseAvg}타` : '평균 미입력';
    return `<div class="member-li"><span>${esc(m.name)} <small>· ${avgTxt} · ${played}라운드</small></span>
      <button style="background:none;border:0;color:var(--ink-soft);font-size:12px;cursor:pointer;text-decoration:underline;font-family:inherit" data-rm="${m.id}">삭제</button></div>`;
  }).join('')||`<p class="empty">등록된 멤버가 없습니다.</p>`;
  return `<div class="card"><h2>멤버 관리</h2>${list}
    <label style="margin-top:14px">이름</label>
    <input type="text" id="m-name" placeholder="예) 김프로" maxlength="10">
    <label>평균타수 <span style="font-weight:400;color:var(--ink-soft)">(선택 · 초기 핸디 기준)</span></label>
    <div class="inline"><input type="number" id="m-avg" inputmode="numeric" min="50" max="160" placeholder="예) 90"><button class="btn" id="m-add">추가</button></div>
    <p class="muted" style="margin-top:12px">평균타수를 넣으면 <b>첫 라운드부터 평균 대비 순위</b>가 계산됩니다(실제 라운드가 3회 쌓이면 자동으로 최근 기록 기준으로 넘어갑니다). 비워두면 3회를 채우기 전까지 그 멤버는 평균 대비 순위에서 제외됩니다.</p></div>
    ${isViewerOnly?'':`<div class="card" style="border:1.5px solid var(--gold)"><h2>🔗 공유용 내보내기</h2>
    <p class="muted" style="margin-bottom:12px">라운드를 입력·수정한 뒤 이 버튼을 누르면, 지금까지의 <b>모든 기록과 사진이 담긴 index.html</b> 파일이 만들어집니다. 이 파일을 GitHub 저장소에 덮어씌워 올리면(Commit) 친구들이 링크에서 최신 결과를 보게 됩니다.</p>
    <button class="btn" id="share-export" style="background:var(--gold);color:#2A2410">📤 공유용 index.html 만들기</button>
    <p class="muted" style="font-size:11px;margin-top:10px">사진이 많으면 파일이 커집니다. 친구들은 이 파일을 <b>보기만</b> 하고, 입력·수정은 이 기기에서만 됩니다.</p>
    </div>`}
    <div class="card"><h2>💾 백업 · 복원</h2>
    <p class="muted" style="margin-bottom:12px">전체 기록을 파일로 저장해 두면, 앱에 문제가 생기거나 기기를 바꿀 때 그대로 되살릴 수 있습니다. 라운드가 끝날 때마다 한 번씩 백업해 두시길 권합니다.</p>
    <button class="btn" id="bk-full">전체 백업 내려받기 <span style="font-weight:400;font-size:12px;opacity:.85">(사진 포함)</span></button>
    <button class="btn" id="bk-lite" style="background:none;color:var(--board);border:1px solid var(--line);margin-top:8px">기록만 내려받기 <span style="font-weight:400;font-size:12px;opacity:.8">(가벼움 · 사진 제외)</span></button>
    <button class="btn ghost" id="bk-import" style="margin-top:8px">백업 파일에서 복원하기</button>
    <p class="muted" style="font-size:11px;margin-top:10px">복원하면 현재 앱의 기록이 백업 파일 내용으로 교체됩니다. 백업 파일은 안전한 곳(구글 드라이브 등)에 보관하세요.</p>
    </div>`;
}

/* ── 렌더 & 이벤트 ───────────────── */
function render(){
  // 보기 전용(공유본)에서는 입력·멤버 탭을 숨김
  if(isViewerOnly){
    document.querySelectorAll('nav button').forEach(b=>{
      if(b.dataset.tab==='entry'||b.dataset.tab==='member') b.style.display='none';
    });
    if(tab==='entry'||tab==='member') tab='board';
  }
  const v=document.getElementById('view');
  v.innerHTML = tab==='board'?viewBoard():tab==='entry'?viewEntry():tab==='hist'?viewHist():tab==='album'?viewAlbum():viewMember();
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  bind();
  if(tab==='entry'){ if(editingId!=null) populateEditScores(); renderMemPreview(); }
  if(tab==='hist') loadHistPhotos();
  if(tab==='album') loadAlbumPhotos();
}
async function loadAlbumPhotos(){
  const imgs=document.querySelectorAll('[data-album-round]');
  for(const el of imgs){
    const src=await getPhoto(el.dataset.albumRound);
    if(src){ el.src=src; el.dataset.full=src; }
    else el.closest('.album-item')?.remove();
  }
  if(!document.querySelector('.album-item') && document.getElementById('album-grid')){
    document.getElementById('album-grid').innerHTML='<p class="empty">아직 등록된 사진이 없어요.<br>라운드를 입력할 때 추억 사진을 올리면 여기에 모입니다.</p>';
  }
}
async function loadHistPhotos(){
  const imgs=document.querySelectorAll('[data-photo-round]');
  for(const el of imgs){
    const src=await getPhoto(el.dataset.photoRound);
    if(src) el.src=src; else el.closest('.hist-photo-wrap')?.remove();
  }
}
function bind(){
  const shx=document.getElementById('share-export');
  if(shx) shx.onclick=()=>exportShareableSite();
  const bkFull=document.getElementById('bk-full');
  if(bkFull) bkFull.onclick=()=>exportBackup(true);
  const bkLite=document.getElementById('bk-lite');
  if(bkLite) bkLite.onclick=()=>exportBackup(false);
  const bkImp=document.getElementById('bk-import');
  if(bkImp) bkImp.onclick=()=>document.getElementById('import-file').click();
  const add=document.getElementById('m-add');
  if(add) add.onclick=async()=>{
    const inp=document.getElementById('m-name');
    const name=inp.value.trim();
    if(!name) return toast('이름을 입력해 주세요.');
    if(db.members.some(m=>m.name===name)) return toast('같은 이름의 멤버가 있어요.');
    const avgEl=document.getElementById('m-avg');
    const member={id:Date.now(),name};
    if(avgEl&&avgEl.value!==''){
      const a=parseInt(avgEl.value,10);
      if(isNaN(a)||a<50||a>160) return toast('평균타수는 50~160 사이로 입력하거나 비워주세요.');
      member.baseAvg=a;
    }
    db.members.push(member);
    await save(); render(); toast(`${name} 님을 추가했어요.`);
  };
  document.querySelectorAll('[data-rm]').forEach(b=>b.onclick=async()=>{
    const m=db.members.find(x=>x.id==b.dataset.rm);
    if(!confirm(`${m.name} 님을 멤버에서 삭제할까요?`)) return;
    db.members=db.members.filter(x=>x.id!=b.dataset.rm);
    await save(); render();
  });
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
    if(!confirm('이 라운드 기록을 삭제할까요? 이후 라운드의 기준타수도 다시 계산됩니다.')) return;
    if(editingId==b.dataset.del) editingId=null;
    const rid=b.dataset.del;
    const r=db.rounds.find(x=>x.id==rid);
    if(r&&r.hasPhoto) await delPhoto(r.id);
    db.rounds=db.rounds.filter(r=>r.id!=rid);
    await save(); render();
  });
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{
    editingId=parseInt(b.dataset.edit,10);
    memPhotoData=null; memPhotoRemoved=false;
    tab='entry'; render();
    window.scrollTo({top:0,behavior:'smooth'});
  });
  const ec=document.getElementById('edit-cancel');
  if(ec) ec.onclick=()=>{ editingId=null; memPhotoData=null; memPhotoRemoved=false; tab='hist'; render(); };
  document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{
    const mid=b.dataset.toggle;
    const box=document.getElementById('holes-'+mid);
    box.classList.toggle('open');
    b.classList.toggle('on',box.classList.contains('open'));
  });
  const fm=document.getElementById('f-method');
  if(fm) fm.onchange=()=>{
    const d=document.getElementById('f-method-desc');
    if(d) d.textContent=METHODS[fm.value].desc;
  };
  const pt=document.getElementById('par-toggle');
  if(pt) pt.onclick=()=>{
    const box=document.getElementById('holes-par');
    box.classList.toggle('open');
    pt.classList.toggle('on',box.classList.contains('open'));
  };
  document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{
    const nm=b.dataset.mode;
    if(nm===holeMode) return;
    const pars=curPars();
    document.querySelectorAll('[data-hole]').forEach(c=>{
      const strokes=cellStrokes(c,pars); // 현재 모드 기준 실제 타수 확보
      const h=parseInt(c.dataset.hole.split('-')[1],10);
      c.value = strokes==null ? '' : String(nm==='diff' ? strokes-pars[h] : strokes);
    });
    holeMode=nm;
    document.querySelectorAll('[data-hole]').forEach(tintHoleCell);
    document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('on',x.dataset.mode===nm));
    const hint=document.getElementById('mode-hint');
    if(hint) hint.textContent = nm==='diff'
      ? '파 기준 숫자를 입력하세요: 파 0 · 보기 1 · 더블보기 2 · 버디 -1. 실제 타수와 합계는 자동 계산됩니다.'
      : '각 홀의 실제 타수를 그대로 입력하세요.';
    db.members.forEach(m=>refreshMemberSum(m.id));
  });
  document.querySelectorAll('[data-hole]').forEach(c=>c.onchange=c.oninput=()=>{
    tintHoleCell(c);
    refreshMemberSum(c.dataset.hole.split('-')[0]);
  });
  document.querySelectorAll('[data-par]').forEach(c=>c.oninput=()=>{
    refreshParSum();
    db.members.forEach(m=>refreshMemberSum(m.id)); // ± 모드 합계는 파에 연동
  });
  const mbtn=document.getElementById('mem-btn');
  if(mbtn) mbtn.onclick=()=>document.getElementById('mem-file').click();
  document.querySelectorAll('.album-item').forEach(it=>it.onclick=()=>{
    const img=it.querySelector('img');
    const src=img&&(img.dataset.full||img.src);
    if(!src) return;
    const cap=it.querySelector('.album-cap');
    document.getElementById('lb-img').src=src;
    document.getElementById('lb-cap').innerHTML=cap?cap.innerHTML:'';
    document.getElementById('lightbox').classList.add('show');
  });
  document.querySelectorAll('[data-hd]').forEach(b=>b.onclick=()=>{
    const d=document.getElementById('hd-'+b.dataset.hd);
    if(!d) return;
    d.classList.toggle('hide');
    b.classList.toggle('open',!d.classList.contains('hide'));
  });
  const sv=document.getElementById('f-save');
  if(sv) sv.onclick=async()=>{
    const date=document.getElementById('f-date').value;
    const course=document.getElementById('f-course').value.trim();
    if(!date) return toast('날짜를 선택해 주세요.');
    const scores={},holes={};let n=0;
    const parsNow=curPars();
    for(const m of db.members){
      const cells=[...document.querySelectorAll(`[data-hole^="${m.id}-"]`)];
      const vals=cells.map(c=>cellStrokes(c,parsNow)); // ± 입력도 실제 타수로 변환해 저장
      const filled=vals.filter(v=>v!=null&&!isNaN(v));
      if(filled.length>0){
        if(filled.length<18) return toast(`${m.name} 님의 홀별 입력이 ${filled.length}/18홀입니다. 모두 채우거나 비워주세요.`);
        if(vals.some(v=>v<1||v>20)) return toast(`${m.name} 님의 홀 타수는 1~20 사이여야 해요.`);
        scores[m.id]=vals.reduce((a,b)=>a+b,0);
        holes[m.id]=vals;
        n++;
      } else {
        const t=document.querySelector(`[data-score="${m.id}"]`);
        if(t&&t.value!==''){
          const v=parseInt(t.value,10);
          if(isNaN(v)||v<50||v>160) return toast(`${m.name} 님의 합계는 50~160 사이로 입력해 주세요.`);
          scores[m.id]=v; n++;
        }
      }
    }
    if(n<2) return toast('두 명 이상의 타수를 입력해 주세요.');
    const pars=[...document.querySelectorAll('[data-par]')].map((c,h)=>{
      const v=parseInt(c.value,10);
      return (isNaN(v)||v<3||v>6)?DEFAULT_PARS[h]:v;
    });
    const roundMethod=(document.getElementById('f-method')||{}).value||curMethod();
    // 홀별 기록이 필요한 방식인데 홀 데이터가 하나도 없으면 경고
    if(['stableford','newperio','skins'].includes(roundMethod) && Object.keys(holes).length<2){
      if(!confirm(`${METHODS[roundMethod].short} 방식은 홀별 기록이 있어야 순위가 계산됩니다. 홀별 입력 없이 이대로 저장하면 이 라운드는 순위 없이 기록만 남습니다. 계속할까요?`)) return;
    }
    if(editingId!=null){
      const r=db.rounds.find(x=>x.id===editingId);
      if(r){
        r.date=date; r.course=course; r.scores=scores; r.holes=holes; r.pars=pars; r.method=roundMethod;
        if(memPhotoData){ await savePhoto(r.id,memPhotoData); r.hasPhoto=true; }
        else if(memPhotoRemoved){ await delPhoto(r.id); r.hasPhoto=false; }
      }
      editingId=null; memPhotoData=null; memPhotoRemoved=false;
      await save(); tab='board'; render(); toast('라운드 기록이 수정됐어요!');
    } else {
      const id=Date.now();
      const round={id,date,course,scores,holes,pars,method:roundMethod};
      if(memPhotoData){ await savePhoto(id,memPhotoData); round.hasPhoto=true; }
      db.rounds.push(round);
      memPhotoData=null; memPhotoRemoved=false;
      await save(); tab='board'; render(); toast('라운드가 저장됐어요!');
    }
  };
}
document.getElementById('mem-file').onchange=async(e)=>{
  const file=e.target.files[0];
  e.target.value='';
  if(!file) return;
  if(!/^image\//.test(file.type)) return toast('이미지 파일만 올릴 수 있어요.');
  toast('사진을 준비하고 있어요…');
  try{
    memPhotoData=await downscalePhoto(file);
    memPhotoRemoved=false;
    renderMemPreview();
  }catch(err){ toast('사진을 불러오지 못했어요. 다른 사진으로 시도해 주세요.'); }
};
document.getElementById('import-file').onchange=async(e)=>{
  const file=e.target.files[0];
  e.target.value='';
  if(!file) return;
  await importBackup(file);
};
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  const t=b.dataset.tab;
  if(t==='entry'&&tab!=='entry'){ editingId=null; memPhotoData=null; memPhotoRemoved=false; }
  tab=t; render();
});
(function(){
  const lb=document.getElementById('lightbox');
  const close=()=>lb.classList.remove('show');
  document.getElementById('lb-close').onclick=close;
  lb.onclick=(e)=>{ if(e.target===lb||e.target.id==='lb-img') close(); };
})();

(async()=>{ await load(); render(); })();
</script>
